{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> {% block title %} Title {% endblock title %} </title>
    <link rel="stylesheet" href="{% static 'InvApp/css/style.css' %}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="{% url 'home' %}" class="nav-logo">Inventory Manager</a>
            <div class="nav-links-container">
                <a href="{% url 'home' %}" class="btn btn-secondary">Home</a>
                <a href="{% url 'createProduct' %}" class="btn">Add Product</a>
                <a href="{% url 'createBrand' %}" class="btn btn-secondary">Add Brand</a>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}
        Content
        {% endblock content %}
    </div>
</body>
</html>
