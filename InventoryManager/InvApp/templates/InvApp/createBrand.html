{% extends "InvApp/base.html" %}

{% block title %}
Create Brand
{% endblock title %}

{% block content %}
<div class="auth-container" style="margin: auto;">
    <h1>Create Brand</h1>
    <form method="post">
        {% csrf_token %}
        {{form}}
        <button type="submit">Add Brand</button>
    </form>
    <div style="margin-top: 2rem; text-align: center;">
        <a href="{% url 'home' %}" class="btn" style="background: var(--glass-bg); border: 1px solid var(--glass-border);">Back to Home</a>
    </div>
</div>
{% endblock content %}
